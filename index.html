<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest | Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #40E0D0; --text: #2d3748; }
        body { font-family: sans-serif; margin: 0; text-align: center; background: #f4f7f6; }
        
        /* The thing that is likely blocking you */
        #auth-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: flex; align-items: center; justify-content: center; z-index: 10000; 
        }
        
        .card { background: white; padding: 40px; border-radius: 20px; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .btn { background: var(--primary); color: white; padding: 15px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }
        
        nav { background: white; padding: 20px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .math-area { margin: 50px auto; padding: 40px; background: white; max-width: 500px; border-radius: 20px; }
        #equation { font-size: 3rem; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="card">
        <h2>MathQuest</h2>
        <input type="email" id="email" class="input" placeholder="Email">
        <input type="password" id="pass" class="input" placeholder="Password">
        <button class="btn" onclick="handleLogin()">Login / Sign Up</button>
        <button class="btn" style="background: #999;" onclick="useGuest()">Play as Guest</button>
    </div>
</div>

<nav>
    <button onclick="startQuiz('Algebra')">Algebra</button>
    <button onclick="startQuiz('Arithmetic')">Arithmetic</button>
</nav>

<div class="math-area">
    <h2 id="title">Select a Subject</h2>
    <div id="equation">?</div>
    <input type="number" id="ans" style="font-size: 2rem; width: 100px; text-align: center;">
    <button class="btn" onclick="checkAns()">Check</button>
    <p>Level: <span id="lvl">1</span> | XP: <span id="xp">0</span></p>
</div>

<script>
    // 1. Force the Guest button to work no matter what
    function useGuest() {
        console.log("Guest Mode Engaged");
        document.getElementById('auth-overlay').classList.add('hidden');
    }

    // 2. Supabase Setup (Wrapped so it doesn't crash the site)
    const SB_URL = 'https://kcuyxqzhmoofbnragrze.supabase.co'; 
    const SB_KEY = 'sb_publishable_Ywi55GRSB5kS6cAfqLHoHQ_xCwZOuOS';
    let supabase = null;
    try {
        if(window.supabase) supabase = window.supabase.createClient(SB_URL, SB_KEY);
    } catch(e) { console.error("Database connection failed"); }

    let state = { xp: 0, lvl: 1 };
    let currentAns = 0;

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!supabase) return useGuest();
        
        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) {
            const { data: d2, error: e2 } = await supabase.auth.signUp({ email, password: pass });
            if (e2) return alert(e2.message);
        }
        useGuest();
    }

    function startQuiz(type) {
        document.getElementById('title').innerText = type;
        gen();
    }

    function gen() {
        let a = Math.floor(Math.random() * 10) + 1;
        let b = Math.floor(Math.random() * 10) + 1;
        currentAns = a + b;
        document.getElementById('equation').innerText = `${a} + ${b}`;
        document.getElementById('ans').value = "";
    }

    function checkAns() {
        const user = parseInt(document.getElementById('ans').value);
        if(user === currentAns) {
            state.xp += 20;
            if(state.xp >= 100) { state.lvl++; state.xp = 0; }
            alert("Correct!");
        } else {
            alert("Wrong!");
        }
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp').innerText = state.xp;
        gen();
    }
</script>

</body>
</html>
